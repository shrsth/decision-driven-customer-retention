[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
# The sys.path insert must run before the app/src imports on Streamlit Cloud.
"app/dashboard.py" = ["E402"]
# These embed long WebGL shader / CSS / JS strings that must not be wrapped.
"app/ferrofluid.py" = ["E501"]
"app/lightrays.py" = ["E501"]
"app/darkveil.py" = ["E501"]
"app/ui.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
# Advisory only — the codebase is not fully typed; mypy runs non-blocking in CI.
check_untyped_defs = false
warn_return_any = false

[tool.coverage.run]
# Coverage `source` takes module/package names, not file paths — "api.py"
# (with the extension) is never imported and breaks the run under NumPy 2.4.
source = ["src", "app", "api"]
omit = ["*/__init__.py"]
